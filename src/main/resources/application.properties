spring.application.name=hair
spring.main.allow-circular-references=true

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.hair=DEBUG
logging.file.name=logs/application.log

# Server Configuration
server.port=8090
server.address=0.0.0.0
server.servlet.context-path=/

# Database Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/barbearia?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:barber_user}
spring.datasource.password=${DB_PASSWORD:P@ulino48581775}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:P@ulino48581775SuperSecretKeyForJWTThatIsLongEnoughToBeSecure}
jwt.expiration=86400000

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Habilita o modo de discriminador do Hibernate 6
# spring.jpa.properties.hibernate.multiTenancy=DISCRIMINATOR
# spring.jpa.properties.hibernate.tenant_identifier_resolver=com.hair.config.CustomTenantIdentifierResolver

# Dica para a VPS de 512MB: use Virtual Threads para melhor performance
spring.threads.virtual.enabled=true