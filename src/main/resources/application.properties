# Substitua re_YOUR_API_KEY_HERE pela sua chave real
resend.api.key=re_bAXF7Avw_4kADqZorsqUMVhvvA9Pt31FV

# Configuração do e-mail remetente
# Domínio verificado no Resend: smartsalao.com.br
resend.from.email=noreply@smartsalao.com.br

# Thymeleaf Configuration (templates de e-mail)
spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Email logging
logging.level.org.springframework.mail=DEBUG